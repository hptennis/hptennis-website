    function twoDigit(number) {
        var twodigit = number >= 10 ? number : "0"+number.toString();
        return twodigit;
    }

    function isBorrowPeriodSet(borrow){
    var result = false;    
    try
    {
      console.log("isBorrowPeriodSet notValidBefore", borrow.borrowed.notValidBefore); 
      console.log("isBorrowPeriodSet notValidAfter", borrow.borrowed.notValidAfter); 
     if (moment(borrow.borrowed.notValidBefore, "YYYY-MM-DD", true).isValid())
       if (moment(borrow.borrowed.notValidAfter, "YYYY-MM-DD", true).isValid())
          { 
            result = true;
          }
    }
    catch (err)
    {
        console.log ("Error occured:", err);
    }
    finally {
        console.log("isBorrowPeriodSet result:", result )
        return result;
    }
  }
